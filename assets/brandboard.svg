  <rect x="288" y="116" width="220" height="200" rx="16" fill="#fff"/>
  <rect x="312" y="148" width="76" height="76" rx="12" fill="#2563EB"/>
  <rect x="408" y="148" width="76" height="36" rx="8" fill="#7C3AED"/>
